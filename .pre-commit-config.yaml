repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (pre-commit)
        # Run with default scanning rules (no baseline or exclude-lines). If this is too strict,
        # re-introduce a baseline file later.
        # args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            backend/.*\.db$|
            .*\.pdf$
          )$
